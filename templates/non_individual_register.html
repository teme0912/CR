<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Non-Individual Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="non-individual-page">
    <div class="overlay"></div>
    <main class="container">
        <header class="hero">
            <h1>Non-Individual Customer Registration</h1>
        </header>

        {% if errors %}
        <section class="card error-box">
            <h2>Why Registration Failed</h2>
            <ul>
                {% for e in errors %}
                <li>{{ e }}</li>
                {% endfor %}
            </ul>
        </section>
        {% endif %}

        <section class="card non-individual-panel form-card">
            <form action="{{ url_for('register_non_individual') }}" method="post">
                <label>Type</label>
                <select name="client_type" required>
                    <option {% if form_data.get('client_type', 'Corporate') == 'Corporate' %}selected{% endif %}>Corporate</option>
                    <option {% if form_data.get('client_type') == 'Association' %}selected{% endif %}>Association</option>
                    <option {% if form_data.get('client_type') == 'Bank' %}selected{% endif %}>Bank</option>
                    <option {% if form_data.get('client_type') == 'NGOs' %}selected{% endif %}>NGOs</option>
                </select>

                <label>Organization Name</label>
                <input type="text" name="organization_name" value="{{ form_data.get('organization_name', '') }}" required />

                <label>Registration Number</label>
                <input type="text" name="registration_number" value="{{ form_data.get('registration_number', '') }}" required />

                <label>Contact Person</label>
                <input type="text" name="contact_person" value="{{ form_data.get('contact_person', '') }}" required />

                <label>Industry</label>
                <input type="text" name="industry" value="{{ form_data.get('industry', '') }}" />

                <label>Phone</label>
                <input type="text" name="phone" value="{{ form_data.get('phone', '') }}" required />

                <label>Email</label>
                <input type="email" name="email" value="{{ form_data.get('email', '') }}" />

                <label>Address</label>
                <textarea name="address">{{ form_data.get('address', '') }}</textarea>

                <h3>KYC</h3>
                <label>Tax ID</label>
                <input type="text" name="tax_id" value="{{ form_data.get('tax_id', '') }}" required />

                <label>Certificate of Incorporation</label>
                <input type="text" name="certificate_of_incorporation" value="{{ form_data.get('certificate_of_incorporation', '') }}" />

                <label>Business License Number</label>
                <input type="text" name="business_license_number" value="{{ form_data.get('business_license_number', '') }}" />

                <label>Beneficial Owner</label>
                <input type="text" name="beneficial_owner" value="{{ form_data.get('beneficial_owner', '') }}" />

                <label>Risk Level (Important)</label>
                <select name="risk_level" required>
                    <option {% if form_data.get('risk_level', 'Medium') == 'Low' %}selected{% endif %}>Low</option>
                    <option {% if form_data.get('risk_level', 'Medium') == 'Medium' %}selected{% endif %}>Medium</option>
                    <option {% if form_data.get('risk_level') == 'High' %}selected{% endif %}>High</option>
                </select>

                <label class="check-label">
                    <input type="checkbox" name="consent" value="yes" {% if form_data.get('consent') == 'yes' %}checked{% endif %} />
                    I confirm KYC details are true.
                </label>

                <div class="action-row">
                    <button type="submit">Submit Registration</button>
                    <button type="button" class="soft-btn" onclick="history.go(-1)">Back</button>
                    <button type="button" class="soft-btn" onclick="location.href='{{ url_for('home') }}'">Home</button>
                </div>
            </form>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script>
        const navEntries = performance.getEntriesByType("navigation");
        if (navEntries.length > 0 && navEntries[0].type === "reload") {
            window.location.replace("{{ url_for('home') }}");
        }
    </script>
</body>
</html>
